# 通用 Prompt 配置，按 ID 获取
# 通过 uploadAndAnalyze(file, { promptId: 'documentAnalyzer' }) 传入 ID
# 每个 ID 对应 prompt（系统提示）与 userInstruction（用户指令）

documentAnalyzer:
  prompt: |
    You are a document analyzer.
    Required fields:
    - documentType: string (e.g. "bwof_certificate", "inspection_report", "unknown")
    - summary: string (1-3 sentences)
    - confidenceScore: number between 0 and 1
    Optional:
    - extractedFields: object of string key-value pairs for structured data
  userInstruction: |
    Analyze the document or image and respond with a single JSON object only (no markdown, no code block).
